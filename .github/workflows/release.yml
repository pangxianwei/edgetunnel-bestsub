name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  WAILS_VERSION: v2.12.0

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@${WAILS_VERSION}

      - name: Test
        run: go test ./...

      - name: Build macOS app
        run: |
          export PATH="$(go env GOPATH)/bin:$PATH"
          wails build -clean -platform darwin/arm64

      - name: Archive macOS app
        run: |
          mkdir -p release
          ditto -c -k --sequesterRsrc --keepParent build/bin/BestSub.app release/BestSub-darwin-arm64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: release/BestSub-darwin-arm64.zip

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@${env:WAILS_VERSION}
          Add-Content $env:GITHUB_PATH "$(go env GOPATH)\bin"

      - name: Test
        run: go test ./...

      - name: Build Windows app
        run: wails build -clean -platform windows/amd64

      - name: Archive Windows app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force release | Out-Null
          Compress-Archive -Path build/bin/BestSub.exe -DestinationPath release/BestSub-windows-amd64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: release/BestSub-windows-amd64.zip

  publish-release:
    runs-on: ubuntu-latest
    needs: [build-macos, build-windows]

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: release-macos
          path: release

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: release

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          name: BestSub ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            release/BestSub-darwin-arm64.zip
            release/BestSub-windows-amd64.zip
